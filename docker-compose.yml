version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: stylemind_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-stylemind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password123}
      POSTGRES_DB: ${POSTGRES_DB:-stylemind_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stylemind"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: stylemind_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  api:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: stylemind_api
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-stylemind}:${POSTGRES_PASSWORD:-password123}@db:5432/${POSTGRES_DB:-stylemind_db}
      - REDIS_URL=redis://redis:6379/0
      - FASHN_API_KEY=${FASHN_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
